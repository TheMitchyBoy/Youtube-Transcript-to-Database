services:
  postgres:
    image: postgres:16-alpine
    container_name: ytdb-postgres
    environment:
      POSTGRES_USER: ytdb
      POSTGRES_PASSWORD: ytdb
      POSTGRES_DB: ytdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytdb -d ytdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ytdb-api
    command: ["uvicorn", "ytdb.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ytdb:ytdb@postgres:5432/ytdb
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
