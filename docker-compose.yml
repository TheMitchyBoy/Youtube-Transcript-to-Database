services:
  postgres:
    image: postgres:16-alpine
    container_name: ytdb-postgres
    environment:
      POSTGRES_USER: ytdb
      POSTGRES_PASSWORD: ytdb
      POSTGRES_DB: ytdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytdb -d ytdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
